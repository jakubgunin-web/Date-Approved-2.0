// ─── Tag Badge ──────────────────────────────────────────────────
function TagBadge({ tagKey, onClick, size = 'md' }) {
  const tag = TAGS[tagKey];
  const [hov, setHov] = useState(false);
  const pad = size === 'sm' ? '3px 8px' : '5px 12px';
  const fs = size === 'sm' ? 10 : 11;
  return (
    <span
      onClick={onClick}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 5,
        background: tag.color,
        color: '#fff',
        border: `1.5px solid ${tag.color}`,
        opacity: hov ? 0.85 : 1,
        borderRadius: 20, padding: pad, fontSize: fs,
        fontWeight: 600, letterSpacing: '0.07em', textTransform: 'uppercase',
        cursor: onClick ? 'pointer' : 'default',
        transition: 'all 0.2s ease', userSelect: 'none',
        whiteSpace: 'nowrap',
        boxShadow: hov ? `0 2px 8px ${tag.color}40` : `0 1px 4px ${tag.color}20`,
      }}>
      
      <span style={{ fontSize: fs - 1 }}>{tag.icon}</span>
      {tag.label}
    </span>);

}

          <h1 className="serif" style={{ fontSize: 68, fontWeight: 400, lineHeight: 0.95, letterSpacing: '-0.03em', marginBottom: 20 }}>
            {occ.label}
          </h1>
          <p style={{ fontSize: 16, color: '#4A4A46', lineHeight: 1.6, maxWidth: 480 }}>{occ.sub}</p>
        </div>


      </div>

      {/* Styling Tips */}
      <div style={{ borderBottom: '1px solid #E8E8E3', background: '#fff' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '48px 40px' }}>

          {/* Tailgate intro paragraph */}
          {tailgateExtra &&
          <div style={{ marginBottom: 48, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'center' }}>
              <div>
                <p style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#9B9B96', marginBottom: 10 }}>The situation</p>
                <h2 className="serif" style={{ fontSize: 36, fontWeight: 400, lineHeight: 1.15, marginBottom: 20 }}>
                  Six hours outside.<br />One outfit to nail it.
                </h2>
                <p style={{ fontSize: 15, color: '#4A4A46', lineHeight: 1.8 }}>{tailgateExtra.intro}</p>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                {tailgateExtra.rules.map((r) =>
              <div key={r.num} style={{ background: '#F5F4F0', padding: '20px', borderRadius: 4 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: occ.color, letterSpacing: '0.08em', display: 'block', marginBottom: 8 }}>{r.num}</span>
                    <p style={{ fontSize: 13, fontWeight: 600, marginBottom: 6, lineHeight: 1.3 }}>{r.title}</p>
                    <p style={{ fontSize: 12, color: '#6B6B66', lineHeight: 1.6 }}>{r.body}</p>
                  </div>
              )}
              </div>
            </div>
          }

          <p style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#9B9B96', marginBottom: 6 }}>
            How to wear it
          </p>
          <h2 className="serif" style={{ fontSize: 30, fontWeight: 400, marginBottom: 36 }}>Styling notes</h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 1, background: '#E8E8E3' }}>
            {tips.map((t, i) =>
            <div key={i} style={{ background: '#FAFAF8', padding: '32px 36px' }}>
                <div style={{
                width: 28, height: 28, borderRadius: '50%',
                background: `${occ.color}18`, border: `1px solid ${occ.color}30`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 12, color: occ.color, fontWeight: 600, marginBottom: 16
              }}>{i + 1}</div>
                <p className="serif" style={{ fontSize: 20, fontWeight: 400, marginBottom: 8, lineHeight: 1.3 }}>"{t.tip}"</p>
                <p style={{ fontSize: 13, color: '#9B9B96', lineHeight: 1.5 }}>{t.sub}</p>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Product Grid */}
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '48px 40px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 32 }}>
          <div>
            <p style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#9B9B96', marginBottom: 6 }}>
              Shop the occasion
            </p>
            <h2 className="serif" style={{ fontSize: 30, fontWeight: 400 }}>{occ.label} Edit</h2>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {['All', 'Women', 'Men'].map((g) =>
            <button key={g} onClick={() => setGenderFilter(g)}
            style={{
              padding: '7px 18px', border: genderFilter === g ? '1.5px solid #1A1A18' : '1px solid #E8E8E3',
              background: genderFilter === g ? '#1A1A18' : 'transparent',
              color: genderFilter === g ? '#fff' : '#1A1A18',
              fontSize: 11, letterSpacing: '0.07em', textTransform: 'uppercase',
              cursor: 'pointer', borderRadius: 3, transition: 'all 0.15s'
            }}>{g}</button>
            )}
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
          {products.map((p, i) =>
          <ProductCard key={i} product={p} tagKey={occasionId} onNavigate={onNavigate} occ={occ} index={i} />
          )}
        </div>
      </div>

      {/* UGC Photo Board */}
      <div style={{ background: '#1A1A18', padding: '64px 0 80px' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 40px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 36 }}>
            <div>
              <p style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#6B6B66', marginBottom: 6 }}>
                Community
              </p>
              <h2 className="serif" style={{ fontSize: 36, fontWeight: 400, color: '#FAFAF8' }}>Styled by real people</h2>
            </div>
            <span style={{ fontSize: 12, color: '#6B6B66', letterSpacing: '0.06em' }}>{occ.label} · @abercrombie</span>
          </div>

          {/* Masonry grid */}
          <div style={{ columns: '4 auto', gap: 10, marginBottom: 36 }}>
            {(PHOTOS.ugc[occasionId] || PHOTOS.ugc.everyday).map((src, i) =>
            <div key={i}
            onMouseEnter={() => setHovPhoto(i)}
            onMouseLeave={() => setHovPhoto(null)}
            style={{
              breakInside: 'avoid', marginBottom: 10,
              position: 'relative', cursor: 'pointer', overflow: 'hidden'
            }}>
                <img src={src} alt="" style={{ width: '100%', display: 'block', objectFit: 'cover',
                transform: hovPhoto === i ? 'scale(1.04)' : 'scale(1)', transition: 'transform 0.4s ease' }} />
                {/* Hover reveal */}
                <div style={{
                position: 'absolute', inset: 0,
                background: 'rgba(26,26,24,0.85)',
                opacity: hovPhoto === i ? 1 : 0,
                transition: 'opacity 0.25s',
                display: 'flex', flexDirection: 'column', justifyContent: 'flex-end',
                padding: 14
              }}>
                  <p style={{ fontSize: 11, color: '#FAFAF8', fontWeight: 500, marginBottom: 6 }}>@college_user_{i + 1}</p>
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 10 }}>
                    <TagBadge tagKey={occasionId} size="sm" />
                  </div>
                  <button onClick={() => onNavigate('product')}
                style={{
                  background: occ.color, color: '#fff', border: 'none', cursor: 'pointer',
                  fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase',
                  padding: '6px 12px', borderRadius: 3, width: '100%'
                }}>
                    Shop this look →
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* CTA */}
          <div style={{
            border: `1px solid ${occ.color}60`,
            borderRadius: 8, padding: '32px 40px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            background: `${occ.color}10`
          }}>
            <div>
              <h3 className="serif" style={{ fontSize: 28, fontWeight: 400, color: '#FAFAF8', marginBottom: 8 }}>
                Share your look → Get featured
              </h3>
              <p style={{ fontSize: 14, color: '#9B9B96', lineHeight: 1.6, maxWidth: 500 }}>
                Wearing A&F for {occ.label.toLowerCase()}? Tag @abercrombie and use <strong style={{ color: '#FAFAF8' }}>#DateApproved</strong> to be featured in this gallery.
              </p>
            </div>
            <button style={{
              background: occ.color, color: '#fff', border: 'none', cursor: 'pointer',
              padding: '14px 28px', fontSize: 12, fontWeight: 500,
              letterSpacing: '0.08em', textTransform: 'uppercase', borderRadius: 4,
              whiteSpace: 'nowrap', flexShrink: 0
            }}>Submit Your Look</button>
          </div>
        </div>
      </div>
    </div>);

}

function ProductCard({ product, tagKey, onNavigate, occ, index }) {
  const [hov, setHov] = useState(false);
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>
      <div style={{
        aspectRatio: '3/4', position: 'relative',
        overflow: 'hidden', cursor: 'pointer', marginBottom: 12
      }} onClick={() => onNavigate('product')}>
        <img src={(PHOTOS.cards[tagKey] || PHOTOS.cards.everyday)[index % 6]} alt={product.name}
        style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block',
          transform: hov ? 'scale(1.04)' : 'scale(1)', transition: 'transform 0.45s ease' }} />
        <div style={{
          position: 'absolute', inset: 0,
          background: hov ? 'rgba(0,0,0,0.06)' : 'transparent',
          transition: 'background 0.2s'
        }} />
        <div style={{ position: 'absolute', top: 10, right: 10 }}>
          <button style={{
            width: 30, height: 30, borderRadius: '50%',
            background: 'rgba(250,250,248,0.9)', border: 'none',
            cursor: 'pointer', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center'
          }}>♡</button>
        </div>
        {product.was &&
        <div style={{
          position: 'absolute', bottom: 10, left: 10,
          background: occ.color, color: '#fff',
          fontSize: 9, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase',
          padding: '3px 7px', borderRadius: 2
        }}>SALE</div>
        }
      </div>
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 4 }}>
          <p style={{ fontSize: 13, fontWeight: 500, lineHeight: 1.4, flex: 1, paddingRight: 8 }}>{product.name}</p>
          <div style={{ textAlign: 'right', flexShrink: 0 }}>
            <span style={{ fontSize: 13, fontWeight: 500, color: product.was ? occ.color : '#1A1A18' }}>${product.price}</span>
            {product.was && <span style={{ fontSize: 11, color: '#AAA', textDecoration: 'line-through', display: 'block' }}>${product.was}</span>}
          </div>
        </div>
        <TagBadge tagKey={tagKey} size="sm" />
      </div>
    </div>);

}

// ─── App ─────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState(() => localStorage.getItem('da_view') || 'product');
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "defaultOccasion": "tailgate",
    "accentColor": "#6B2737",
    "showSaleBadge": true
  } /*EDITMODE-END*/;
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  const navigate = (v) => {
    setView(v);
    localStorage.setItem('da_view', v);
    window.scrollTo({ top: 0 });
  };

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const occasionId = view.startsWith('occasion-') ? view.replace('occasion-', '') : tweaks.defaultOccasion;

  return (
    <div>
      <Nav onNavigate={navigate} currentView={view} />
      {view === 'product' && <ProductPage onNavigate={navigate} />}
      {view === 'occasions' && <OccasionsGrid onNavigate={navigate} />}
      {view.startsWith('occasion-') && <OccasionPage occasionId={occasionId} onNavigate={navigate} />}

      {/* Tweaks panel */}
      {tweaksOpen &&
      <div style={{
        position: 'fixed', bottom: 24, right: 24, zIndex: 999,
        background: '#fff', border: '1px solid #E8E8E3', borderRadius: 12,
        boxShadow: '0 8px 40px rgba(0,0,0,0.12)', padding: '20px 22px',
        width: 260
      }}>
          <p style={{ fontSize: 12, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 18, color: '#1A1A18' }}>
            Tweaks
          </p>
          <div style={{ marginBottom: 16 }}>
            <p style={{ fontSize: 11, color: '#9B9B96', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Default Occasion</p>
            {OCCASIONS.map((o) =>
          <label key={o.id} style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', marginBottom: 6 }}>
                <input type="radio" checked={tweaks.defaultOccasion === o.id} onChange={() => updateTweak('defaultOccasion', o.id)} />
                <span style={{ fontSize: 13 }}>{o.label}</span>
              </label>
          )}
          </div>
          <div style={{ marginBottom: 16 }}>
            <p style={{ fontSize: 11, color: '#9B9B96', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Show Sale Badge</p>
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
              <input type="checkbox" checked={tweaks.showSaleBadge} onChange={(e) => updateTweak('showSaleBadge', e.target.checked)} />
              <span style={{ fontSize: 13 }}>Sale badge visible</span>
            </label>
          </div>
          <div>
            <p style={{ fontSize: 11, color: '#9B9B96', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Navigate to</p>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {[
            { label: 'Product', v: 'product' },
            { label: 'All Occasions', v: 'occasions' },
            { label: 'Date Night', v: 'occasion-datenight' },
            { label: 'Tailgate', v: 'occasion-tailgate' }].
            map(({ label, v }) =>
            <button key={v} onClick={() => {navigate(v);}}
            style={{
              padding: '5px 10px', fontSize: 11, border: '1px solid #E8E8E3',
              background: view === v ? '#1A1A18' : 'transparent',
              color: view === v ? '#fff' : '#1A1A18',
              borderRadius: 4, cursor: 'pointer'
            }}>{label}</button>
            )}
            </div>
          </div>
        </div>
      }
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
